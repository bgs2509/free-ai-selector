# =============================================================================
# Free AI Selector - Docker Compose (единая конфигурация)
# =============================================================================
# Единый файл для всех окружений (локальная разработка, VPS).
# Различия между окружениями — только через значения в .env.
#
# Сетевая модель:
#   HOST network: Business API (:8020), Telegram Bot, Health Worker
#   BRIDGE network: Data API (8021→8001), PostgreSQL
#
# Зачем host: VPN-маршрутизация для AI-провайдеров и Telegram API,
# доступность для других проектов через localhost:8020.
#
# Запуск:
#   docker compose up -d --build
#   или: make up
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  # Порт БД не публикуем: доступ только внутри Docker-сети (security by default).
  postgres:
    image: postgres:16-alpine
    container_name: free-ai-selector-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - free-ai-selector-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Data API Service (PostgreSQL Data Layer)
  # ---------------------------------------------------------------------------
  # Остаётся на bridge-сети. Порт 8021 проброшен на хост для доступа
  # от сервисов на host network и для локальной разработки.
  # http://localhost:8021/docs — OpenAPI документация Data API.
  free-ai-selector-data-postgres-api:
    build:
      context: ./services/free-ai-selector-data-postgres-api
      dockerfile: Dockerfile
    container_name: free-ai-selector-data-postgres-api
    ports:
      - "127.0.0.1:8021:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATA_API_HOST: ${DATA_API_HOST}
      DATA_API_PORT: ${DATA_API_PORT}
      DATA_API_LOG_LEVEL: ${DATA_API_LOG_LEVEL}
      LOG_LEVEL: ${DATA_API_LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER}
      ROOT_PATH: ${DATA_API_ROOT_PATH:-}
      RUN_ID: ${RUN_ID:-}
      RUN_SOURCE: ${RUN_SOURCE:-docker-compose}
      RUN_SCENARIO: ${RUN_SCENARIO:-}
      RUN_STARTED_AT: ${RUN_STARTED_AT:-}
      AUDIT_ENABLED: ${AUDIT_ENABLED:-false}
      AUDIT_JSONL_PATH: ${AUDIT_JSONL_PATH:-/audit/audit.jsonl}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - free-ai-selector-network
    restart: unless-stopped
    volumes:
      - ./services/free-ai-selector-data-postgres-api:/app
      - /app/__pycache__
      - ./docs/api-tests/results/audit:/audit

  # ---------------------------------------------------------------------------
  # Business API Service (Business Logic Layer)
  # ---------------------------------------------------------------------------
  # Host network для VPN-маршрутизации к AI-провайдерам.
  # Uvicorn слушает порт 8020 (переопределён через command).
  # http://localhost:8020/docs — OpenAPI документация Business API.
  free-ai-selector-business-api:
    build:
      context: ./services/free-ai-selector-business-api
      dockerfile: Dockerfile
    container_name: free-ai-selector-business-api
    network_mode: host
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8020", "--no-access-log"]
    environment:
      BUSINESS_API_HOST: ${BUSINESS_API_HOST}
      BUSINESS_API_PORT: ${BUSINESS_API_PORT}
      BUSINESS_API_LOG_LEVEL: ${BUSINESS_API_LOG_LEVEL}
      LOG_LEVEL: ${BUSINESS_API_LOG_LEVEL:-INFO}
      DATA_API_URL: ${DATA_API_URL:-http://localhost:8021}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      SAMBANOVA_API_KEY: ${SAMBANOVA_API_KEY}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      # F003: Новые провайдеры (6 шт.)
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      HYPERBOLIC_API_KEY: ${HYPERBOLIC_API_KEY:-}
      NOVITA_API_KEY: ${NOVITA_API_KEY:-}
      SCALEWAY_API_KEY: ${SCALEWAY_API_KEY:-}
      # Ollama (local LLM)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS}
      RATE_LIMIT_PERIOD: ${RATE_LIMIT_PERIOD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: ${ENVIRONMENT}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER}
      ROOT_PATH: ${ROOT_PATH:-}
      # F012: Rate Limit Handling
      RATE_LIMIT_DEFAULT_COOLDOWN: ${RATE_LIMIT_DEFAULT_COOLDOWN:-3600}
      # F023: Retry configuration (exponential backoff)
      MAX_RETRIES: ${MAX_RETRIES:-0}
      RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS:-10}
      RETRY_BASE_DELAY: ${RETRY_BASE_DELAY:-2.0}
      RETRY_MAX_DELAY: ${RETRY_MAX_DELAY:-30.0}
      RETRY_JITTER: ${RETRY_JITTER:-1.0}
      # F024: Circuit breaker configuration
      CB_FAILURE_THRESHOLD: ${CB_FAILURE_THRESHOLD:-2}
      CB_RECOVERY_TIMEOUT: ${CB_RECOVERY_TIMEOUT:-300}
      # F023: Cooldown for permanent errors
      AUTH_ERROR_COOLDOWN_SECONDS: ${AUTH_ERROR_COOLDOWN_SECONDS:-86400}
      VALIDATION_ERROR_COOLDOWN_SECONDS: ${VALIDATION_ERROR_COOLDOWN_SECONDS:-86400}
      RUN_ID: ${RUN_ID:-}
      RUN_SOURCE: ${RUN_SOURCE:-docker-compose}
      RUN_SCENARIO: ${RUN_SCENARIO:-}
      RUN_STARTED_AT: ${RUN_STARTED_AT:-}
      AUDIT_ENABLED: ${AUDIT_ENABLED:-false}
      AUDIT_JSONL_PATH: ${AUDIT_JSONL_PATH:-/audit/audit.jsonl}
    depends_on:
      free-ai-selector-data-postgres-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8020/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    volumes:
      - ./services/free-ai-selector-business-api:/app
      - /app/__pycache__
      - ./docs/api-tests/results/audit:/audit

  # ---------------------------------------------------------------------------
  # Telegram Bot Service (User Interface Layer)
  # ---------------------------------------------------------------------------
  # Host network для доступа к Telegram API (polling) и Business API.
  free-ai-selector-telegram-bot:
    build:
      context: ./services/free-ai-selector-telegram-bot
      dockerfile: Dockerfile
    container_name: free-ai-selector-telegram-bot
    network_mode: host
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_LOG_LEVEL: ${TELEGRAM_BOT_LOG_LEVEL}
      LOG_LEVEL: ${TELEGRAM_BOT_LOG_LEVEL:-INFO}
      BUSINESS_API_URL: ${BUSINESS_API_URL_BOT:-http://localhost:8020}
      BOT_ADMIN_IDS: ${BOT_ADMIN_IDS}
      BOT_MAX_MESSAGE_LENGTH: ${BOT_MAX_MESSAGE_LENGTH}
      ENVIRONMENT: ${ENVIRONMENT}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER}
    depends_on:
      free-ai-selector-business-api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./services/free-ai-selector-telegram-bot:/app
      - /app/__pycache__

  # ---------------------------------------------------------------------------
  # Health Worker Service (Background Monitoring)
  # ---------------------------------------------------------------------------
  # Host network для доступа к Business API и Data API через localhost.
  free-ai-selector-health-worker:
    build:
      context: ./services/free-ai-selector-health-worker
      dockerfile: Dockerfile
    container_name: free-ai-selector-health-worker
    network_mode: host
    environment:
      WORKER_LOG_LEVEL: ${WORKER_LOG_LEVEL}
      LOG_LEVEL: ${WORKER_LOG_LEVEL:-INFO}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL}
      DATA_API_URL: ${DATA_API_URL_WORKER:-http://localhost:8021}
      BUSINESS_API_URL: ${BUSINESS_API_URL_WORKER:-http://localhost:8020}
      ENVIRONMENT: ${ENVIRONMENT}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER}
      RUN_ID: ${RUN_ID:-}
      RUN_SOURCE: ${RUN_SOURCE:-docker-compose}
      RUN_SCENARIO: ${RUN_SCENARIO:-}
      RUN_STARTED_AT: ${RUN_STARTED_AT:-}
      AUDIT_ENABLED: ${AUDIT_ENABLED:-false}
      AUDIT_JSONL_PATH: ${AUDIT_JSONL_PATH:-/audit/audit.jsonl}
    depends_on:
      free-ai-selector-data-postgres-api:
        condition: service_healthy
      free-ai-selector-business-api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./services/free-ai-selector-health-worker:/app
      - /app/__pycache__
      - ./docs/api-tests/results/audit:/audit

# =============================================================================
# Networks
# =============================================================================
networks:
  # Bridge-сеть для Data API и PostgreSQL.
  # Сервисы на host network обращаются к Data API через проброшенный порт 8021.
  free-ai-selector-network:
    driver: bridge
    name: free-ai-selector-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: free-ai-selector-postgres-data
